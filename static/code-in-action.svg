<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Animated pixel creature aligned legs</title>
  <desc>A pixel art orange creature with 4 properly aligned legs</desc>
  <defs>
    <style>
      @keyframes bob {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes leg1 {
        0%, 100% { transform: translateY(0px); }
        25%       { transform: translateY(-12px); }
        75%       { transform: translateY(6px); }
      }
      @keyframes leg2 {
        0%, 100% { transform: translateY(6px); }
        25%       { transform: translateY(0px); }
        75%       { transform: translateY(-12px); }
      }
      @keyframes leg3 {
        0%, 100% { transform: translateY(-6px); }
        25%       { transform: translateY(6px); }
        75%       { transform: translateY(0px); }
      }
      @keyframes leg4 {
        0%, 100% { transform: translateY(6px); }
        25%       { transform: translateY(-12px); }
        75%       { transform: translateY(0px); }
      }
      @keyframes armL {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(10px); }
      }
      @keyframes armR {
        0%, 100% { transform: translateY(10px); }
        50%       { transform: translateY(0px); }
      }
      @keyframes blink {
        0%, 88%, 100% { transform: scaleY(1); }
        93%            { transform: scaleY(0.08); }
      }
      .body-bob { animation: bob 0.42s ease-in-out infinite; }
      .l1 { animation: leg1 0.42s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 0%; }
      .l2 { animation: leg2 0.42s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 0%; }
      .l3 { animation: leg3 0.42s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 0%; }
      .l4 { animation: leg4 0.42s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 0%; }
      .arm-l { animation: armL 0.42s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
      .arm-r { animation: armR 0.42s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
      .eye { animation: blink 3s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
    </style>
  </defs>

  <g class="l1"><rect x="251" y="320" width="36" height="64" fill="#CC785C"/></g>
  <g class="l2"><rect x="298" y="320" width="36" height="64" fill="#CC785C"/></g>
  <g class="l3"><rect x="345" y="320" width="36" height="64" fill="#CC785C"/></g>
  <g class="l4"><rect x="392" y="320" width="36" height="64" fill="#CC785C"/></g>

  <g class="body-bob">
    <g class="arm-l">
      <rect x="192" y="190" width="48" height="48" fill="#CC785C"/>
    </g>
    <g class="arm-r">
      <rect x="440" y="190" width="48" height="48" fill="#CC785C"/>
    </g>
    <rect x="240" y="160" width="200" height="160" fill="#CC785C"/>
    <g class="eye">
      <rect x="272" y="188" width="36" height="36" fill="#1a1a1a"/>
    </g>
    <g class="eye">
      <rect x="372" y="188" width="36" height="36" fill="#1a1a1a"/>
    </g>
  </g>

</svg>

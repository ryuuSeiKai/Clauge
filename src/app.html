<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			#clauge-splash {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				/* Match icon card gradient (#1a1040 → #060414) so card blends into bg */
				background: radial-gradient(ellipse at 35% 25%, #1a1040 0%, #060414 80%);
				z-index: 9999;
				transition: opacity 0.3s ease;
				pointer-events: none;
			}
			#clauge-splash.fade-out { opacity: 0; }
			#clauge-splash img {
				width: 180px;
				height: 180px;
				pointer-events: none;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="clauge-splash"><img src="/clauge-icon-animated.svg" alt="" aria-hidden="true" /></div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

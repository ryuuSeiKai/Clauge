name: Test Bundle

# Manually-triggered bundle build. Produces installers as 14-day workflow
# artifacts without creating a GitHub release. Use this to verify the
# bundle pipeline (or test a build on a real OS) before committing to a
# tagged release.
#
# Trigger from Actions tab → Test Bundle → Run workflow.
# Or via CLI: gh workflow run test-bundle.yml --ref <branch> -f platforms=all

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: Which platforms to build
        type: choice
        options:
          - all
          - macos
          - windows
          - windows-arm
          - linux
          - linux-arm
        default: all

jobs:
  # GitHub Actions doesn't let you reference `matrix.*` in a job-level
  # `if:`. So we generate the matrix dynamically here based on the
  # selected platforms input — only the chosen runners spin up.
  plan:
    runs-on: ubuntu-latest
    outputs:
      includes: ${{ steps.set.outputs.includes }}
    steps:
      - id: set
        shell: bash
        run: |
          MAC_AARCH64='{"platform":"macos-latest","args":"--target aarch64-apple-darwin","rust-targets":"aarch64-apple-darwin","label":"macos-aarch64"}'
          MAC_X86='{"platform":"macos-latest","args":"--target x86_64-apple-darwin","rust-targets":"x86_64-apple-darwin","label":"macos-x86_64"}'
          WIN='{"platform":"windows-latest","args":"","rust-targets":"","label":"windows-x64"}'
          WIN_ARM='{"platform":"windows-11-arm","args":"--target aarch64-pc-windows-msvc","rust-targets":"aarch64-pc-windows-msvc","label":"windows-arm64"}'
          LINUX='{"platform":"ubuntu-22.04","args":"","rust-targets":"","label":"linux-x64"}'
          LINUX_ARM='{"platform":"ubuntu-22.04-arm","args":"","rust-targets":"","label":"linux-arm64"}'

          case "${{ inputs.platforms }}" in
            macos)       INCLUDES="[$MAC_AARCH64,$MAC_X86]" ;;
            windows)     INCLUDES="[$WIN]" ;;
            windows-arm) INCLUDES="[$WIN_ARM]" ;;
            linux)       INCLUDES="[$LINUX]" ;;
            linux-arm)   INCLUDES="[$LINUX_ARM]" ;;
            *)           INCLUDES="[$MAC_AARCH64,$MAC_X86,$WIN,$WIN_ARM,$LINUX,$LINUX_ARM]" ;;
          esac

          echo "includes=$INCLUDES" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.includes) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            patchelf \
            pkg-config \
            rpm

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build app
        # tauri-action with no tagName just runs tauri build — no release is
        # created. Test builds skip Apple cert + notarization (no APPLE_*
        # secrets passed). DMGs will trigger Gatekeeper warnings; Windows
        # NSIS will trigger SmartScreen — fine for verifying the bundler.
        # Real signed builds come from publish.yml when you tag a release.
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: clauge-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
          retention-days: 14
          if-no-files-found: warn
